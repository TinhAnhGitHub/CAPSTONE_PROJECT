services:
  triton-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: triton-transformer-server:latest
    container_name: triton-hf-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '8gb'
    ulimits:
      memlock: -1
      stack: 67108864
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./model_repository:/opt/tritonserver/model_repository:ro
      - hf-cache:/root/.cache/huggingface
    environment:
      - PRIVATE_REPO_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_TOKEN=${HF_TOKEN:-}
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HOME=/root/.cache/huggingface
      - PYTHONUNBUFFERED=1
    command: >
      tritonserver 
      --model-repository=/opt/tritonserver/model_repository
      --strict-model-config=false
      --log-verbose=1
    # command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  hf-cache: