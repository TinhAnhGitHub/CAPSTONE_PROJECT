services:
  mmbert:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: te_mmbert
    shm_size: "4gb"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    ports:
      - "${MMBERT_PORT}:8000"
    volumes:
      - "${MMBERT_MODEL_DIR}:/models:ro"
    cap_add:
      - IPC_LOCK  
    ulimits:
      memlock: -1 
      stack: 67108864
    command: >
      -m /models/${MMBERT_MODEL}
      --embedding
      --ctx-size 40960
      --parallel 5
      --batch-size 8192
      --ubatch-size 8192
      --threads 12
      --host 0.0.0.0
      --port 8000
      --mlock
      --cont-batching
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [shared]
    
  qwen_vl_embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen_vl_embedding
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${QWEN_VL_EMBEDDING_PORT}:8080"
    volumes:
      - "${QWEN_VL_EMBEDDING_MODEL_DIR}:/models:ro"
    command: >
      -m /models/${QWEN_VL_EMBEDDING_MODEL}
      --mmproj /models/${QWEN_VL_EMBEDDING_MODEL_MMPROJ}
      --embedding
      -nkvo
      -c 32768
      --ctx-size 16384
      --batch-size 8192
      --ubatch-size 8192
      --port 8080
      --pooling none
      -t 6
      --threads-batch 6
      --n-gpu-layers 2
      --flash-attn on
      -ctk q8_0 
      -ctv q8_0
      --flash-attn on 
      --cont-batching
    restart: unless-stopped
    networks: [shared]

