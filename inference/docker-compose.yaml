  triton-server:
    image: nvcr.io/nvidia/tritonserver:25.11-py3
    container_name: triton-server
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "${TRITON_HTTP_PORT}:8000"
      - "${TRITON_GRPC_PORT}:8001"
      - "${TRITON_METRICS_PORT}:8002"
    volumes:
      - "${TRITON_MODEL_REPOSITORY}:/opt/tritonserver/model_repository:ro"
    environment:
      PRIVATE_REPO_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: "1"
      OMP_NUM_THREADS: "8"
      MKL_NUM_THREADS: "8"
      ONNXRUNTIME_INTRA_OP_NUM_THREADS: "8"
      ONNXRUNTIME_INTER_OP_NUM_THREADS: "1"
      VLLM_MM_ENCODER_CACHE_SIZE: "1024"
      VLLM_MAX_NUM_BATCHED_TOKENS: "4096"
    command: >
      tritonserver
      --model-repository=/opt/tritonserver/model_repository
      --strict-model-config=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks: [shared]
  
  qwen3-asr:
    image: qwenllm/qwen3-asr:latest
    container_name: qwen3-asr-06b
    ipc: host
    shm_size: "4gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${QWEN_ASR_PORT:-8005}:80"
    volumes:
      - "${HUGGINGFACE_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface"
    command: >
      qwen-asr-serve Qwen/Qwen3-ASR-0.6B 
      --gpu-memory-utilization 0.25
      --max-model-len 2048
      --max-num-seqs 2
      --enforce-eager
      --host 0.0.0.0 
      --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [shared]



networks:
  shared:
    external: true
    name: video_shared_net