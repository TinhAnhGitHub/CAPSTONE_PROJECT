tasks:
  video_registration:
    name: "Video Registration"
    description: "Extract and register video metadata including FPS, duration, and format"
    stage: "Ingestion"
    tags:
      - "video"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 120
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "video_registration_cache_key"

  autoshot_detection:
    name: "Autoshot Segment Detection"
    description: "Detect scene boundaries (shots) in video using ML model"
    stage: "Analysis"
    tags:
      - "autoshot-task"
    retries: 3
    retry_delay_seconds: 10
    timeout_seconds: 600
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "video_artifact_cache_key"

    additional_kwargs:
      model_name: "autoshot"
      model_version: "01"

  asr_transcription:
    name: "ASR Transcription"
    description: "Transcribe audio to text using automatic speech recognition"
    stage: "Analysis"
    tags:
      - "asr-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "asr_batch_cache_key"

    additional_kwargs:
      model_name: "Qwen/Qwen3-ASR-0.6B"
      client_url: "http://qwen3-asr:80/v1"

  audio_segmentation:
    name: "Audio Segmentation"
    description: "Segment ASR results into semantically meaningful chunks using LLM or rule-based fallback"
    stage: "Analysis"
    tags:
      - "audio-segment-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "audio_segment_cache_key"

    additional_kwargs:
      model: "openrouter/hunter-alpha"
      batch_size: 10
      min_duration_sec: 30

  segment_embedding:
    name: "Segment Embedding"
    description: "Extract 6 frames from audio segments and embed using QwenVL"
    stage: "Analysis"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_embedding_cache_key"

    additional_kwargs:
      base_url: "http://qwen_vl_embedding:8080/embedding"
      n_frames: 4

  segment_caption:
    name: "Segment Caption"
    description: "Generate captions for audio segments using VLM with visual frames and audio transcript"
    stage: "Analysis"
    tags:
      - "llm-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_caption_cache_key"

    additional_kwargs:
      model: "nvidia/nemotron-nano-12b-v2-vl:free"
      base_url: "https://openrouter.ai/api/v1"
      n_frames: 4
      max_concurrent: 5

  segment_caption_embedding:
    name: "Segment Caption Embedding"
    description: "Embed segment caption texts using mmBERT and persist as TextCapSegmentEmbedArtifacts"
    stage: "Indexing"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 120
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_caption_embedding_cache_key"

    additional_kwargs:
      model_name: "mmbert"
      base_url: "http://mmbert:8000"

  segment_caption_multimodal_embedding:
    name: "Segment Caption Multimodal Embedding"
    description: "Embed segment frames using QwenVL and persist as SegmentCaptionMultimodalEmbedArtifacts"
    stage: "Indexing"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_caption_multimodal_embedding_cache_key"

    additional_kwargs:
      base_url: "http://qwen_vl_embedding:8080/embedding"
      n_frames: 4

  video_preprocess:
    name: "Video Preprocess"
    description: "Download video once and extract audio segments and frame indices for downstream tasks"
    stage: "Analysis"
    tags:
      - "preprocess"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 600
    cache_enabled: false

  image_extraction:
    name: "Image Extraction"
    description: "Extract representative frames from video segments and persist as ImageArtifacts"
    stage: "Analysis"
    tags:
      - "image-chunk-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  
    cache_key_fn: "image_extraction_batch_cache_key"

  image_caption:
    name: "Image Caption"
    description: "Caption extracted video frames using a VLM via OpenRouter and persist as ImageCaptionArtifacts"
    stage: "Analysis"
    tags:
      - "llm-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000
    cache_key_fn: "image_batch_cache_key_caption"

    additional_kwargs:
      model: "qwen/qwen3-vl-8b-instruct"
      base_url: "https://openrouter.ai/api/v1"

  image_caption_embedding:
    name: "Image Caption Embedding"
    description: "Embed caption texts using mmBERT and persist as TextCaptionEmbeddingArtifacts"
    stage: "Indexing"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 120
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "caption_embedding_batch_cache_key"

    additional_kwargs:
      model_name: "mmbert"
      base_url: "http://mmbert:8000"

  image_caption_multimodal_embedding:
    name: "Image Caption Multimodal Embedding"
    description: "Embed caption source images using QwenVL and persist as ImageCaptionMultimodalEmbeddingArtifacts"
    stage: "Indexing"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "caption_multimodal_embedding_batch_cache_key"

    additional_kwargs:
      base_url: "http://qwen_vl_embedding:8080/embedding"

  image_ocr:
    name: "Image OCR"
    description: "Run OCR on extracted video frames using LightON and persist as ImageOCRArtifacts"
    stage: "Analysis"
    tags:
      - "ocr-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000
    cache_key_fn: "image_batch_cache_key_ocr"

    additional_kwargs:
      model_name: "ocr_lighton"
      base_url: "http://ocr_lighton:8000"

  image_embedding:
    name: "Image Embedding"
    description: "Embed extracted video frames using QwenVL and persist as ImageEmbeddingArtifacts"
    stage: "Analysis"
    tags:
      - "embedding-task"
    retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000
    cache_key_fn: "image_batch_cache_key_embedding"

    additional_kwargs:
      base_url: "http://qwen_vl_embedding:8080/embedding"

  qdrant_indexing:
    name: "Qdrant Indexing"
    description: "Upsert image, caption, and multimodal embeddings into Qdrant with dense + sparse indexing"
    stage: "Indexing"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 300
    cache_enabled: false

    additional_kwargs:
      collection_base: "video_embedding2"
      image_dim: 2048      # QwenVL visual embedding dim
      image_dense_field: "image_dense"

      caption_dim: 768     # mmBERT text embedding dim
      caption_text_dense_field: "caption_text_dense"
      caption_sparse_field: "caption_sparse"
      
      mm_dim: 2048         
      caption_mm_dense_field: "caption_mm_dense"

      on_disk: true
      
      qdrant_timeout: 30

  image_qdrant_indexing:
    name: "Image Qdrant Indexing"
    description: "Upsert image embeddings into Qdrant as dense vectors"
    stage: "Indexing"
    tags:
      - "qdrant-task"
      - "indexing-task"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "image_qdrant_indexing_cache_key"

  caption_qdrant_indexing:
    name: "Caption Qdrant Indexing"
    description: "Upsert caption embeddings into Qdrant as hybrid vectors (dense + sparse)"
    stage: "Indexing"
    tags:
      - "qdrant-task"
      - "indexing-task"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "caption_qdrant_indexing_cache_key"

  segment_qdrant_indexing:
    name: "Segment Qdrant Indexing"
    description: "Upsert segment embeddings into Qdrant vector database"
    stage: "Indexing"
    tags:
      - "qdrant-task"
      - "indexing-task"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_qdrant_indexing_cache_key"

  segment_caption_qdrant_indexing:
    name: "Segment Caption Qdrant Indexing"
    description: "Upsert segment caption embeddings into Qdrant as hybrid vectors (dense + sparse)"
    stage: "Indexing"
    tags:
      - "qdrant-task"
      - "indexing-task"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 300
    cache_enabled: true
    cache_expiration_seconds: 2592000  # 30 days
    cache_key_fn: "segment_caption_qdrant_indexing_cache_key"

  kg_extraction:
    name: "Knowledge Graph Extraction"
    description: "Extract entities, micro-events, and relationships from segment captions using LLM"
    stage: "Analysis"
    tags:
      - "kg-task"
      - "llm-service"
    retries: 2
    retry_delay_seconds: 10
    timeout_seconds: 600
    cache_enabled: false

    additional_kwargs:
      model: "qwen/qwen3-coder-next"
      base_url: "https://openrouter.ai/api/v1"
      max_tokens: 10000
      max_concurrent: 5

